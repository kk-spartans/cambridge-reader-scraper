version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: daily
    open-pull-requests-limit: 0
    commit-message:
      prefix: "deps"

  - package-ecosystem: bun
    directory: "/"
    schedule:
      interval: daily
    open-pull-requests-limit: 0
    commit-message:
      prefix: "deps"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 0
    commit-message:
      prefix: "deps"
