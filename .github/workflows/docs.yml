name: Docs

on:
  push:
    branches:
      - "**"
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint, Typecheck, Build Docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          version: 2026.4.8
          install: true

      - name: Setup uv cache
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: .github/codespell-requirements.txt

      - name: Configure Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v6

      - name: Install dependencies
        run: mise run install

      - name: Lint docs
        run: mise run docs-lint

      - name: Run codespell
        run: mise run codespell -- --config .codespellrc --check-filenames --check-hidden docs

      - name: Typecheck docs
        run: mise run docs-typecheck

      - name: Build docs
        run: mise run docs-build

      - name: Write .nojekyll
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: touch docs/out/.nojekyll

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/out

  deploy:
    name: Deploy Docs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
