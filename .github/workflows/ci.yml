name: CI

on:
  push:
    paths:
      - "src/**"
      - "bin/**"
      - "package.json"
      - "tsconfig.json"
      - "tsconfig.build.json"
      - ".gitignore"
      - ".oxfmtrc.json"
      - ".oxlintrc.json"
      - ".releaserc.json"
      - ".codespellrc"
      - ".github/codespell-requirements.txt"
      - ".github/dependabot.yml"
      - ".github/workflows/ci.yml"
      - ".github/workflows/release.yml"
      - "knip.json"
      - "mise.toml"
      - "UNLICENSE"
  pull_request:
    paths:
      - "src/**"
      - "bin/**"
      - "package.json"
      - "tsconfig.json"
      - "tsconfig.build.json"
      - ".gitignore"
      - ".oxfmtrc.json"
      - ".oxlintrc.json"
      - ".releaserc.json"
      - ".codespellrc"
      - ".github/codespell-requirements.txt"
      - ".github/dependabot.yml"
      - ".github/workflows/ci.yml"
      - ".github/workflows/release.yml"
      - "knip.json"
      - "mise.toml"
      - "UNLICENSE"

jobs:
  quality:
    name: Lint, Format, Typecheck, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          version: latest
          install: true

      - name: Setup uv cache
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: .github/codespell-requirements.txt

      - name: Install dependencies
        run: mise run install

      - name: Check formatting
        run: mise run format-check

      - name: Lint
        run: mise run lint

      - name: Type check
        run: mise run typecheck

      - name: Build package
        run: mise run build

      - name: Check dead code
        run: mise run knip

      - name: Run codespell
        run: mise run codespell -- --config .codespellrc --check-filenames --check-hidden .
