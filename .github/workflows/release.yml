name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  issues: write
  pull-requests: write
  packages: write

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v16
        with:
          name: devenv

      - run: nix profile add nixpkgs#devenv

      - name: Save previous tag
        id: pre
        run: echo "tag=$(git tag --list 'v*' --sort=-version:refname | head -1)" >> "$GITHUB_OUTPUT"

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ""
          NPM_CONFIG_PROVENANCE: true
        run: devenv tasks run cambridge-reader-scraper:release

      - name: Check for new release
        id: check
        run: |
          TAG=$(git tag --list 'v*' --sort=-version:refname | head -1)
          PREV="${{ steps.pre.outputs.tag }}"
          if [ -z "$TAG" ] || [ "$TAG" = "$PREV" ]; then
            echo "No new release, skipping Docker image build"
            exit 0
          fi
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        if: steps.check.outputs.version != ''
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: steps.check.outputs.version != ''
        uses: docker/setup-buildx-action@v3

      - name: Generate short SHA
        if: steps.check.outputs.version != ''
        id: sha
        run: echo "short=${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        if: steps.check.outputs.version != ''
        uses: docker/build-push-action@v6
        with:
          context: .
          file: devops/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/cambridge-reader-scraper-app:latest
            ghcr.io/${{ github.repository }}/cambridge-reader-scraper-app:${{ steps.sha.outputs.short }}
            ghcr.io/${{ github.repository }}/cambridge-reader-scraper-app:v${{ steps.check.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
