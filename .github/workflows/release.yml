name: Release

on:
  push:
    branches:
      - main
      - master
    paths:
      - "src/**"
      - "bin/**"
      - "package.json"
      - "tsconfig.json"
      - "tsconfig.build.json"
      - ".gitignore"
      - ".oxfmtrc.json"
      - ".oxlintrc.json"
      - ".releaserc.json"
      - ".codespellrc"
      - ".github/codespell-requirements.txt"
      - ".github/workflows/release.yml"
      - "knip.json"
      - "mise.toml"
      - "UNLICENSE"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          version: latest
          install: true

      - name: Install dependencies
        run: mise run install

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ""
          NPM_CONFIG_PROVENANCE: true
        run: pnpm exec semantic-release
